<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltGame - Spider Solitaire Pro v1.1.2</title>
    <style>
        :root {
            --table-green: #1a5e20;
            --card-width: 80px;
            --card-height: 120px;
            --accent: #00f2fe;
        }

        body {
            background-color: var(--table-green);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        /* Overlay Difficulty */
        #difficulty-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .menu-box {
            background: #111; padding: 40px; border-radius: 20px;
            border: 2px solid var(--accent); text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }

        /* Status Bar */
        .status-bar {
            width: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Game Board */
        .game-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            width: 98%;
            margin-top: 20px;
            padding: 10px;
        }

        .column {
            min-height: 600px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        /* Card Design */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            background: white;
            color: black;
            border-radius: 8px;
            margin-bottom: -90px;
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-sizing: border-box;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            user-select: none;
            border: 1px solid #ccc;
        }

        .card.red { color: #d32f2f; }

        .card.selected {
            outline: 4px solid var(--accent);
            transform: translateY(-15px);
            z-index: 1000;
            box-shadow: 0 0 20px var(--accent);
        }

        .card-value { font-weight: bold; font-size: 18px; line-height: 1; }
        .card-suit-small { font-size: 14px; margin-top: 2px; }
        .card-suit-main { font-size: 40px; text-align: center; margin-top: 5px; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

        /* Stock Pile */
        .stock-pile {
            position: fixed;
            bottom: 30px;
            right: 50px;
            display: flex;
            cursor: pointer;
        }

        .card-back {
            width: var(--card-width);
            height: var(--card-height);
            background: #2c3e50;
            border: 2px solid white;
            border-radius: 8px;
            background-image: repeating-linear-gradient(45deg, #34495e, #34495e 10px, #2c3e50 10px, #2c3e50 20px);
            box-shadow: -3px 0 5px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .stock-count {
            position: absolute;
            top: -30px;
            right: 0;
            background: var(--accent);
            color: black;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50px;
            z-index: 2000;
        }

        .extra-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .version-label {
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            opacity: 0.7;
            margin-left: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-undo { background: #ffa502; color: white; }
        .btn-restart { background: #2f3542; color: white; }
        .btn-hint { background: #1e90ff; color: white; }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake-anim { animation: shake 0.3s; }

        @keyframes goldGlow {
            0% { background: #fff; transform: scale(1); }
            50% { background: #ffd700; transform: scale(1.1); box-shadow: 0 0 30px #ffd700; }
            100% { background: #fff; transform: scale(1); }
        }

        .complete-anim { animation: goldGlow 0.8s infinite; z-index: 2000; }

        @keyframes dealCardAnim {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hint-highlight {
            box-shadow: 0 0 25px yellow !important;
            border: 2px solid yellow !important;
            z-index: 1001;
        }
    </style>
</head>
<body>

<div id="difficulty-overlay">
    <div class="menu-box">
        <h1 style="color:var(--accent); margin-top:0;">ALTGAME SPIDER</h1>
        <p>Pilih Tingkat Kesulitan:</p>
        <button style="background:#4caf50; color:white; width:200px; margin:5px;" onclick="setDifficulty('easy')">EASY (1 Suit)</button><br>
        <button style="background:#ff9800; color:white; width:200px; margin:5px;" onclick="setDifficulty('medium')">MEDIUM (2 Suits)</button><br>
        <button style="background:#f44336; color:white; width:200px; margin:5px;" onclick="setDifficulty('hard')">HARD (4 Suits)</button>
    </div>
</div>

<div class="status-bar">
    <div>MODE: <span id="mode-text" style="color:var(--accent)">-</span></div>
    <div>WAKTU: <span id="timer">00:00</span></div>
    <div>SKOR: <span id="score">0</span></div>
    <div>HIGH SCORE: <span id="high-score">0</span></div>
</div>

<div class="game-container" id="game-board">
    <div class="column" data-idx="0" onclick="moveCard(0)"></div>
    <div class="column" data-idx="1" onclick="moveCard(1)"></div>
    <div class="column" data-idx="2" onclick="moveCard(2)"></div>
    <div class="column" data-idx="3" onclick="moveCard(3)"></div>
    <div class="column" data-idx="4" onclick="moveCard(4)"></div>
    <div class="column" data-idx="5" onclick="moveCard(5)"></div>
    <div class="column" data-idx="6" onclick="moveCard(6)"></div>
    <div class="column" data-idx="7" onclick="moveCard(7)"></div>
    <div class="column" data-idx="8" onclick="moveCard(8)"></div>
    <div class="column" data-idx="9" onclick="moveCard(9)"></div>
</div>

<div class="stock-pile" onclick="dealStock()">
    <div id="stock-count" class="stock-count">Sisa: 50</div>
    <div id="stock-visual"></div>
</div>

<div class="controls">
    <div class="extra-controls">
        <button class="btn-restart" onclick="location.reload()">RESTART</button>
        <button class="btn-undo" onclick="undoMove()">UNDO</button>
        <button class="btn-hint" onclick="giveHint()">HINT (-50)</button>
        <button class="btn-main" onclick="location.reload()">GAME BARU</button>
        <span class="version-label">versi beta 1.0</span>
    </div>
</div>

<script>
    const values = ['K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2', 'A'];
    const suits = [
        { s: '♠', c: 'black' }, 
        { s: '♥', c: 'red' },   
        { s: '♣', c: 'black' }, 
        { s: '♦', c: 'red' }    
    ];

    let deck = [];
    let score = 0;
    let seconds = 0;
    let timerInterval;
    let selectedEle = null;
    let history = [];
    let currentDifficulty = 'easy';

    function setDifficulty(mode) {
        currentDifficulty = mode;
        document.getElementById('difficulty-overlay').style.display = 'none';
        document.getElementById('mode-text').innerText = mode.toUpperCase();
        initGame();
    }

    function initGame() {
        score = 0; seconds = 0; history = [];
        document.getElementById('score').innerText = score;
        document.getElementById('high-score').innerText = localStorage.getItem('altgame_hs') || 0;
        clearInterval(timerInterval);
        startTimer();

        deck = [];
        let numSuits = (currentDifficulty === 'easy') ? 1 : (currentDifficulty === 'medium') ? 2 : 4;
        
        for(let i=0; i<8; i++) {
            let suitObj = suits[i % numSuits];
            values.forEach(v => deck.push({ v, s: suitObj.s, c: suitObj.c }));
        }
        deck.sort(() => Math.random() - 0.5);

        const columns = document.querySelectorAll('.column');
        columns.forEach(c => c.innerHTML = '');

        for(let i=0; i<54; i++) {
            const cardData = deck.pop();
            columns[i % 10].appendChild(createCard(cardData.v, cardData.s, cardData.c));
        }
        updateStockUI();
    }

    function createCard(val, suit, color) {
        const card = document.createElement('div');
        card.className = `card ${color}`;
        card.dataset.value = val;
        card.dataset.suit = suit;
        
        card.innerHTML = `
            <div class="card-value">${val}</div>
            <div class="card-suit-small">${suit}</div>
            <div class="card-suit-main">${suit}</div>
        `;
        
        card.onclick = (e) => {
            e.stopPropagation();
            if (selectedEle && selectedEle !== card) {
                moveCard(parseInt(card.parentElement.dataset.idx));
            } else {
                if (isLegalChain(card)) {
                    clearSelection();
                    selectedEle = card;
                    let curr = card;
                    while(curr) { curr.classList.add('selected'); curr = curr.nextElementSibling; }
                } else {
                    card.classList.add('shake-anim');
                    setTimeout(() => card.classList.remove('shake-anim'), 300);
                }
            }
        };
        return card;
    }

    function isLegalChain(card) {
        let curr = card;
        while(curr.nextElementSibling) {
            let next = curr.nextElementSibling;
            if (next.dataset.suit !== curr.dataset.suit || 
                values.indexOf(next.dataset.value) !== values.indexOf(curr.dataset.value) + 1) return false;
            curr = next;
        }
        return true;
    }

    function saveState() {
        const state = [];
        document.querySelectorAll('.column').forEach(col => {
            state.push(Array.from(col.querySelectorAll('.card')).map(c => ({
                v: c.dataset.value, s: c.dataset.suit, c: c.classList.contains('red') ? 'red' : 'black'
            })));
        });
        history.push({ cols: state, deck: [...deck], score: score });
    }

    function undoMove() {
        if (history.length === 0) return;
        const last = history.pop();
        deck = last.deck; score = last.score;
        updateScore(); updateStockUI();
        document.querySelectorAll('.column').forEach((col, i) => {
            col.innerHTML = '';
            last.cols[i].forEach(data => col.appendChild(createCard(data.v, data.s, data.c)));
        });
    }

    function moveCard(colIdx) {
        if (!selectedEle) return;
        const targetCol = document.querySelectorAll('.column')[colIdx];
        const lastCard = targetCol.lastElementChild;

        if (!lastCard || values.indexOf(selectedEle.dataset.value) === values.indexOf(lastCard.dataset.value) + 1) {
            saveState();
            let curr = selectedEle;
            let toMove = [];
            while(curr) { toMove.push(curr); curr = curr.nextElementSibling; }
            toMove.forEach(c => targetCol.appendChild(c));
            score += 10;
            updateScore();
            setTimeout(() => checkComplete(targetCol), 300);
        }
        clearSelection();
    }

    function dealStock() {
        if (deck.length === 0) return;
        const cols = document.querySelectorAll('.column');
        for(let c of cols) if(c.children.length === 0) return alert("Semua kolom harus terisi minimal 1 kartu!");
        
        saveState();
        cols.forEach((col) => {
            if(deck.length > 0) {
                const data = deck.pop();
                const newCard = createCard(data.v, data.s, data.c);
                newCard.style.animation = "dealCardAnim 0.3s ease-out";
                col.appendChild(newCard);
            }
        });
        updateStockUI();
    }

    function updateStockUI() {
        document.getElementById('stock-count').innerText = `Sisa: ${deck.length}`;
        const visual = document.getElementById('stock-visual');
        visual.innerHTML = '';
        const stacks = Math.ceil(deck.length / 10);
        for(let i = 0; i < stacks; i++) {
            const b = document.createElement('div');
            b.className = 'card-back';
            b.style.position = "absolute";
            b.style.right = (i * 10) + "px"; 
            visual.appendChild(b);
        }
    }

    function checkComplete(col) {
        const cards = Array.from(col.querySelectorAll('.card'));
        if (cards.length < 13) return;
        for (let i = 0; i <= cards.length - 13; i++) {
            let suit = cards[i].dataset.suit;
            let match = true;
            for (let j = 0; j < 13; j++) {
                if (cards[i+j].dataset.value !== values[j] || cards[i+j].dataset.suit !== suit) { match = false; break; }
            }
            if (match) {
                const set = cards.slice(i, i+13);
                set.forEach(c => c.classList.add('complete-anim'));
                setTimeout(() => {
                    set.forEach(c => c.remove());
                    score += 1000; updateScore();
                }, 1000);
            }
        }
    }

    function clearSelection() {
        document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
        selectedEle = null;
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
        let hs = localStorage.getItem('altgame_hs') || 0;
        if (score > hs) localStorage.setItem('altgame_hs', score);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds/60).toString().padStart(2,'0');
            let s = (seconds%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function giveHint() {
        if (score < 50) return alert("Skor tidak cukup!");
        const columns = document.querySelectorAll('.column');
        for (let i = 0; i < columns.length; i++) {
            const cards = columns[i].querySelectorAll('.card');
            for (let j = 0; j < cards.length; j++) {
                const card = cards[j];
                if (isLegalChain(card)) {
                    for (let k = 0; k < columns.length; k++) {
                        if (i === k) continue;
                        const targetLast = columns[k].lastElementChild;
                        if (!targetLast || values.indexOf(card.dataset.value) === values.indexOf(targetLast.dataset.value) + 1) {
                            card.classList.add('hint-highlight');
                            if (targetLast) targetLast.classList.add('hint-highlight');
                            score -= 50; updateScore();
                            setTimeout(() => {
                                card.classList.remove('hint-highlight');
                                if (targetLast) targetLast.classList.remove('hint-highlight');
                            }, 2500);
                            return;
                        }
                    }
                }
            }
        }
    }
</script>
</body>
</html>
